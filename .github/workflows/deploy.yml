name: Trigger EC2 Image Builder

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  IMAGEBUILDER_PIPELINE_ARN: ${{ secrets.IMAGEBUILDER_PIPELINE_ARN }}

jobs:
  deploy:
    name: Start image pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required secrets
        run: |
          test -n "${IMAGEBUILDER_PIPELINE_ARN}" || (echo "Missing IMAGEBUILDER_PIPELINE_ARN secret" && exit 1)

      - name: Start EC2 Image Builder pipeline
        run: |
          aws imagebuilder start-image-pipeline-execution \
            --image-pipeline-arn "${IMAGEBUILDER_PIPELINE_ARN}" \
            --client-token "${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Deployment note
        run: |
          echo "Image Builder has been triggered."
          echo "App Runner should redeploy automatically after your pipeline publishes the new image to the source App Runner watches."
